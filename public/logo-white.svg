<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <!-- Door frame -->
  <rect x="55" y="10" width="90" height="130" rx="4" stroke="white" stroke-width="5" fill="none"/>
  <!-- Door panels top -->
  <rect x="67" y="22" width="29" height="38" rx="2" stroke="white" stroke-width="3" fill="none"/>
  <rect x="104" y="22" width="29" height="38" rx="2" stroke="white" stroke-width="3" fill="none"/>
  <!-- Door panels bottom -->
  <rect x="67" y="68" width="29" height="58" rx="2" stroke="white" stroke-width="3" fill="none"/>
  <rect x="104" y="68" width="29" height="58" rx="2" stroke="white" stroke-width="3" fill="none"/>
  <!-- Door knob -->
  <circle cx="92" cy="100" r="4" fill="white"/>
  <!-- Separator line -->
  <line x1="30" y1="158" x2="170" y2="158" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <!-- COCINA text -->
  <text x="100" y="180" font-family="Georgia, serif" font-size="22" font-weight="700" fill="white" text-anchor="middle" letter-spacing="6">COCINA</text>
  <!-- OCULTA text -->
  <text x="100" y="208" font-family="Georgia, serif" font-size="22" font-weight="700" fill="white" text-anchor="middle" letter-spacing="6">OCULTA</text>
</svg>
